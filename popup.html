<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="load-fonts.js"></script>
    <style>
        :root {
            /* Kagi Moon Dark graphite scale */
            --bg-deep: #0f0f10;        /* ~graphite-1000 */
            --bg-base: #16161a;        /* ~graphite-950, app-bg */
            --bg-raised: #1c1c1e;      /* ~graphite-900 */
            --bg-hover: #28282a;       /* ~graphite-800 */
            --bg-input: #121214;       /* ~graphite-950/input-bg */
            --border: #333336;         /* ~graphite-700 */
            --border-subtle: #28282a;  /* ~graphite-800 */
            --border-focus: rgba(140, 207, 205, 0.4);
            --text-primary: #e5e5e5;   /* doggo-color-1 */
            --text-secondary: #88888c; /* ~graphite-400 */
            --text-muted: #55555a;     /* ~graphite-600 */
            --text-hint: #44444a;      /* ~graphite-600 dimmer */
            --accent: #8CCFCD;
            --accent-dim: rgba(140, 207, 205, 0.10);
            --accent-glow: rgba(140, 207, 205, 0.06);
            --green: #8CCFCD;
            --green-dim: rgba(140, 207, 205, 0.15);
            --radius-sm: 6px;
            --radius-md: 8px;
            --transition-fast: 0.15s ease;
            --transition-med: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 420px;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        body::-webkit-scrollbar { width: 5px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        body::-webkit-scrollbar-thumb:hover { background: #3a3a3e; }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, var(--accent) 0%, transparent 50%);
            opacity: 0.15;
        }
        .header-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        .header h1 span {
            color: var(--accent);
            font-weight: 700;
        }

        /* ── Toggle Section ── */
        .toggle-section {
            padding: 4px 12px 4px;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            border: 1px solid rgba(140, 207, 205, 0.35);
            border-radius: var(--radius-md);
            padding: 2px;
            background: rgba(140, 207, 205, 0.08);
        }
        .toggle-group .toggle-group {
            grid-column: 1 / -1;
            border: 1px dashed rgba(140, 207, 205, 0.35);
            background: rgba(140, 207, 205, 0.06);
            padding: 0;
        }
        .toggle-group--alt {
            width: 50%;
            grid-template-columns: 1fr;
            border-color: rgba(63, 98, 168, 0.4);
            background: rgba(63, 98, 168, 0.08);
        }
        .toggle-group--alt .toggle input:checked + .toggle-track {
            background: rgba(63, 98, 168, 0.15);
            border-color: rgba(63, 98, 168, 0.35);
        }
        .toggle-group--alt .toggle input:checked + .toggle-track::before {
            background: #3f62a8;
            box-shadow: 0 0 8px rgba(63, 98, 168, 0.3), 0 1px 2px rgba(0,0,0,0.2);
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 5px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            position: relative;
        }
        .toggle-row:hover {
            background: rgba(140, 207, 205, 0.18);
        }
        .toggle-muted:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .toggle-group--alt .toggle-row:hover {
            background: rgba(63, 98, 168, 0.2);
        }
        .toggle-row[data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            left: 6px;
            bottom: 100%;
            margin-bottom: 4px;
            padding: 5px 8px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 10.5px;
            font-weight: 400;
            line-height: 1.3;
            width: max-content;
            max-width: 300px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .toggle-row[data-tip]:nth-child(even)::after {
            left: auto;
            right: 6px;
        }
        .toggle-row[data-tip]:hover::after {
            opacity: 1;
        }
        .toggle-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.2;
            user-select: none;
            white-space: nowrap;
        }

        /* Toggle Switch */
        .toggle {
            position: relative;
            width: 32px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .toggle-track {
            position: absolute;
            inset: 0;
            background: #2a2a2c;
            border-radius: 9px;
            border: 1px solid var(--border);
            transition: all var(--transition-med);
        }
        .toggle-track::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            left: 2px;
            top: 2px;
            background: #6a6a6e;
            border-radius: 50%;
            transition: all var(--transition-med);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .toggle input:checked + .toggle-track {
            background: var(--accent-dim);
            border-color: rgba(140, 207, 205, 0.3);
        }
        .toggle input:checked + .toggle-track::before {
            transform: translateX(14px);
            background: var(--accent);
            box-shadow: 0 0 8px rgba(140, 207, 205, 0.3), 0 1px 2px rgba(0,0,0,0.2);
        }
        .toggle input:focus-visible + .toggle-track {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .toggle-muted .toggle input:checked + .toggle-track {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .toggle-muted .toggle input:checked + .toggle-track::before {
            background: #999;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .toggle-row.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* ── URL Section ── */
        .url-section {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-raised);
            display: none;
        }
        .url-section.visible {
            display: block;
        }
        .url-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .url-input {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 12.5px;
            font-weight: 400;
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .url-input::placeholder {
            color: var(--text-hint);
        }
        .url-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(140, 207, 205, 0.08);
        }

        /* ── Divider between toggle and categories ── */
        .section-break {
            height: 1px;
            background: var(--bg-deep);
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        /* ── Categories ── */
        .categories {
            background: var(--bg-base);
            padding: 4px 0 8px;
            transition: opacity 0.3s ease;
            display: none;
        }
        .categories.visible {
            display: block;
        }
        .categories.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .cat-group {
            padding: 0 16px;
        }
        .cat-group:last-child {
            padding-bottom: 8px;
        }
        .cat-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0 2px;
        }
        .cat-group-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .cat-group-actions {
            display: flex;
            gap: 2px;
        }
        .cat-group-actions button {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 10.5px;
            font-weight: 500;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 4px;
            transition: all var(--transition-fast);
        }
        .cat-group-actions button:hover {
            color: var(--accent);
            background: var(--accent-glow);
            border-color: rgba(140, 207, 205, 0.15);
        }

        .cat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
        }

        /* ── Category Item ── */
        .cat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.12s ease;
            user-select: none;
        }
        .cat-item:hover {
            background: rgba(140, 207, 205, 0.18);
        }

        .cat-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(140, 207, 205, 0.25);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-med);
        }
        .cat-item input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 6px rgba(140, 207, 205, 0.3);
        }
        .cat-item input[type="checkbox"]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .cat-name {
            font-size: 13px;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            line-height: 1;
        }

        /* ── Group Divider ── */
        .divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 1px 16px;
        }

        /* ── Bookmark Star ── */
        .bookmark-star {
            width: 16px;
            height: 16px;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: none;
            flex-shrink: 0;
        }
        .bookmark-star:hover {
            opacity: 0.85;
            transform: scale(1.15);
        }
        .bookmark-star.active {
            opacity: 0.8;
        }

        /* ── Appreciate Heart ── */
        .appreciate-btn {
            width: 16px;
            height: 16px;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: none;
            flex-shrink: 0;
        }
        .appreciate-btn:hover {
            opacity: 0.85;
            transform: scale(1.15);
        }
        .appreciate-btn.active {
            opacity: 0.8;
        }

        /* ── Reading List Book ── */
        .reading-list-btn {
            width: 16px;
            height: 16px;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: none;
            flex-shrink: 0;
        }
        .reading-list-btn:hover {
            opacity: 0.85;
            transform: scale(1.15);
        }
        .reading-list-btn.active {
            opacity: 0.8;
        }

        /* ── Tab Bar ── */
        .tab-bar {
            display: none;
            background: var(--bg-base);
            padding: 0 16px;
            position: relative;
        }
        .tab-bar.visible {
            display: flex;
        }
        .tab-btn {
            flex: 1;
            padding: 9px 0 7px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            position: relative;
            transition: color var(--transition-fast), border-color var(--transition-med),
                        text-shadow var(--transition-med);
        }
        .tab-btn[data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            left: 0;
            bottom: 100%;
            margin-bottom: 4px;
            padding: 5px 8px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 10.5px;
            font-weight: 400;
            font-style: normal;
            text-transform: none;
            letter-spacing: normal;
            line-height: 1.3;
            width: max-content;
            max-width: 300px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .tab-btn[data-tip]:last-child::after {
            left: auto;
            right: 0;
        }
        .tab-btn[data-tip]:hover::after {
            opacity: 1;
        }
        .tab-btn:hover {
            color: var(--text-secondary);
        }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            text-shadow: 0 0 12px rgba(140, 207, 205, 0.3);
        }

        /* ── Feeds ── */
        .feeds {
            background: var(--bg-base);
            padding: 4px 0 8px;
            display: none;
        }
        .feeds.visible {
            display: block;
        }

        /* ── Feed Pills ── */
        .feed-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px 0 2px;
        }
        .feed-pill {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
        }
        .feed-pill:hover {
            border-color: rgba(140, 207, 205, 0.4);
            color: var(--text-primary);
            background: var(--accent-glow);
        }
        .feed-pill.active {
            border-color: rgba(140, 207, 205, 0.5);
            background: var(--accent-dim);
            color: var(--accent);
        }
        .feed-pill input {
            display: none;
        }

        /* ── History ── */
        .history {
            background: var(--bg-base);
            padding: 4px 0 8px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .history.visible {
            display: block;
        }
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        .history-date-label {
            padding: 6px 16px 2px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .history-empty {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 16px 2px;
        }
        .history-header-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .history-clear {
            background: none;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-family: var(--font-family, system-ui), system-ui, sans-serif;
            font-size: 10.5px;
            font-weight: 500;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 4px;
            transition: all var(--transition-fast);
        }
        .history-clear:hover {
            color: #e57373;
            background: rgba(229, 115, 115, 0.08);
            border-color: rgba(229, 115, 115, 0.2);
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 16px;
            transition: background 0.12s ease;
        }
        .history-item:hover {
            background: var(--bg-hover);
        }
        .history-item-link {
            flex: 1;
            min-width: 0;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .history-item-link:hover {
            color: var(--accent);
        }
        .history-item-source {
            font-size: 10px;
            color: var(--text-muted);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .history-item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .history-item:hover .history-item-actions {
            opacity: 1;
        }
        .history-action {
            width: 14px;
            height: 14px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.15s ease, transform 0.15s ease;
            flex-shrink: 0;
        }
        .history-action:hover {
            opacity: 1;
            transform: scale(1.15);
        }
        .history-action.done {
            opacity: 0.8;
        }

        /* ── Header Actions (star/heart/book group) ── */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ── Header Badges ── */
        .header-badges {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .header-badges a {
            display: flex;
            align-items: center;
            opacity: 0.7;
            transition: opacity var(--transition-fast);
        }
        .header-badges a:hover {
            opacity: 1;
        }
        .header-badges img {
            height: 24px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="https://kagi.com/smallweb" target="_blank" rel="noopener noreferrer" title="Kagi Small Web" class="header-logo-link">
            <img class="header-icon" src="icons/icon.svg" alt="Kagi Small Web">
        </a>
        <h1>Kagi <span>Small Web</span></h1>
        <div class="header-actions">
            <img id="appreciateBtn" class="appreciate-btn" src="icons/heart-empty.svg" alt="Appreciate" title="Appreciate this page">
            <img id="bookmarkStar" class="bookmark-star" src="icons/star-empty.svg" alt="Bookmark" title="Bookmark this page">
            <img id="readingListBtn" class="reading-list-btn" src="icons/book-empty.svg" alt="Reading List" title="Add to Reading List">
        </div>
        <div class="header-badges">
            <a href="https://kagi.com" title="Use Kagi" target="_blank" rel="noopener noreferrer">
                <img src="icons/use-kagi.gif" alt="Use Kagi">
            </a>
            <a href="https://github.com/kagisearch/smallweb?tab=readme-ov-file#kagi-small-web" title="Kagi Small Web" target="_blank" rel="noopener noreferrer">
                <img src="icons/small-web-88x31.gif" alt="Kagi Small Web">
            </a>
        </div>
    </div>

    <div class="toggle-section">
        <div class="toggle-group">
            <label class="toggle-row toggle-muted" data-tip="Replace Chrome's default New Tab">
                <span class="toggle"><input type="checkbox" id="tabTakeoverToggle"><span class="toggle-track"></span></span>
                <span class="toggle-label">Override New Tab</span>
            </label>
            <label class="toggle-row toggle-muted" id="blockFocusToggleRow" data-tip="View pages in a frame — press Esc or click a link to open directly">
                <span class="toggle"><input type="checkbox" id="blockFocusToggle"><span class="toggle-track"></span></span>
                <span class="toggle-label">Focus in address bar</span>
            </label>
            <div class="toggle-group">
                <label class="toggle-row" id="smallWebToggleRow" data-tip="Randomly picks from selected categories and feeds">
                    <span class="toggle"><input type="checkbox" id="smallWebToggle"><span class="toggle-track"></span></span>
                    <span class="toggle-label">Categories & Feeds</span>
                </label>
                <label class="toggle-row" id="directModeRow" data-tip="Load categories from the Small Web feed">
                    <span class="toggle"><input type="checkbox" id="directModeToggle"><span class="toggle-track"></span></span>
                    <span class="toggle-label">Disable Kagi frame</span>
                </label>
            </div>
        </div>
        <div class="url-section" id="urlSection">
            <div class="url-label">New tab URL</div>
            <input type="text" class="url-input" id="customUrl" placeholder="https://kagi.com">
        </div>
        <div class="toggle-group toggle-group--alt" id="bingRedirectRow" style="display:none">
            <label class="toggle-row" data-tip="Redirect Bing and Cortana to your default search engine">
                <span class="toggle"><input type="checkbox" id="bingRedirectToggle"><span class="toggle-track"></span></span>
                <span class="toggle-label">Redirect Bing</span>
            </label>
        </div>
    </div>

    <div class="section-break"></div>

    <div id="tabBar" class="tab-bar">
        <button class="tab-btn active" data-tab="categories" data-tip="Small Web topic categories to include">Categories</button>
